# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.

# Basic Site Settings
locale                   : "en-US"
title                    : "Lin / Church Life"
title_separator          : "-"
name                     : &name "Lin"
description              : &description "Lin / Church Life"
url                      : "https://linbible.github.io"
baseurl                  : ""
repository               : "linbible/linbible.github.io"

# Site Author
author:
  avatar           : "Sing_Profile.jpeg"
  name             : "Lin"
  pronouns         : "he/his"  
  bio              : "I am using this website to track my life in church."
  location         : "CBCCP"
  employer         : "Jesus"

# Site Settings
breadcrumbs              : false
words_per_minute         : 160
future                   : false
read_more                : "disabled"
talkmap_link             : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README.md
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  fellowship:
    output: true
    permalink: /:collection/:path/
  reading:
    output: true
    permalink: /:collection/:path/
  worship:
    output: true
    permalink: /:collection/:path/
  praying:
    output: true
    permalink: /:collection/:path/
  sundayschool:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:  
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: fellowship
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: reading
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: worship
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: praying
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: sundayschool
    values:
      layout: single
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/Los_Angeles

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
